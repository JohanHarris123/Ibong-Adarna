<!DOCTYPE html>
<html lang="tl">

<head>
    <meta charset="UTF-8">
    <title>Ibong Adarna Script</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            line-height: 1.6;
        }

        /* SPLIT SCREEN NAVBAR */

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            overflow-y: auto;
            background: #111;
            color: white;
            padding: 15px;
        }

        /* SCRIPT SIDE */

        .container {
            margin-left: 280px;
            padding: 40px;
        }

        /* SCENES */

        .scene {
            margin-top: 40px;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }

        .character {
            font-weight: bold;
        }

        audio {
            display: block;
            margin: 10px 0;
        }
    </style>
</head>


<body>


    <!-- NAVBAR -->

    <div class="navbar">

        <h3>BACKGROUND MUSIC</h3>

        <p><b>MAGICAL 1</b></p>
        <audio controls src="sounds/magical.mp3"></audio>

        <p><b>FOREST LOOP</b></p>
        <audio controls src="sounds/forest.mp3"></audio>

        <p><b>INTENSE</b></p>
        <audio controls src="sounds/intense1.mp3"></audio>

        <p><b>FIGHT</b></p>
        <audio controls src="sounds/fightreal.mp3"></audio>

        <p><b>ROMANTIC</b></p>
        <audio controls src="sounds/romantic.mp3"></audio>

        <p><b>MARRIAGE</b></p>
        <audio controls src="sounds/marriage.mp3"></audio>

        <hr>

        <h3>HIGANTE FIGHT KEYS</h3>
        <p>1 = Sword</p>
        <p>2 = Sword</p>
        <p>3 = Fall</p>

        <audio id="sword1" src="sounds/sword1.mp3"></audio>
        <audio id="sword2" src="sounds/sword2.mp3"></audio>
        <audio id="fallSound" src="sounds/falldown.mp3"></audio>
    </div>



    <div class="container">

        <h1 style="text-align:center;">IBONG ADARNA</h1>


        <div class="scene" id="scene1">

            <p><b>FLASHBACK SOUND</b></p>
            <audio controls src="sounds/flashback.mp3"></audio>

            <p><b>TRUMPET SOUND</b></p>
            <audio controls src="sounds/trumpet.mp3"></audio>

            <p><b>CLAP SOUND</b></p>
            <audio controls src="sounds/clap.mp3"></audio>

            <p><b>DANCE MUSIC</b></p>
            <audio controls src="sounds/dance.mp3"></audio>

            <p><b>FALL SOUND</b></p>
            <audio controls src="sounds/fall.mp3"></audio>

        </div>



        <div class="scene" id="scene2">
            <p><b>BECOMING ROCK SOUND</b></p>
            <audio controls src="sounds/rock.mp3"></audio>

            <p><b>ROCK BREAKING SOUND</b></p>
            <audio controls src="sounds/stonebreak.mp3"></audio>
        </div>

        <div class="scene" id="scene4">
            <p>RIZZ</p>
            <audio controls src="sounds/rizz.mp3"></audio>
        </div>



        <div class="scene" id="scene5">
            <p><b>FALLING SOUND</b></p>
            <audio controls src="sounds/falldowndonjuan.mp3"></audio>
        </div>

    </div>



    <script>
        let fightMode = true;

        document.addEventListener("keydown", function (e) {

            if (!fightMode) return;

            if (e.key === "1") {
                let s = document.getElementById("sword1");
                s.currentTime = 0;
                s.play();
            }

            if (e.key === "2") {
                let s = document.getElementById("sword2");
                s.currentTime = 0;
                s.play();
            }

            if (e.key === "3") {
                let s = document.getElementById("fallSound");
                s.currentTime = 0;
                s.play();
            }

        });

    </script>


</body>

</html>
